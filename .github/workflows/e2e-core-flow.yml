name: Core Flow — Round-Trip (Vitest)

on:
  push:
    branches: [main]
    paths:
      - "src/lib/flowTemplateSchema.ts"
      - "src/test/core-flow-roundtrip.test.ts"
      - "src/test/fixtures/core-flow.definicao.json"
      - ".github/workflows/e2e-core-flow.yml"
  pull_request:
    paths:
      - "src/lib/flowTemplateSchema.ts"
      - "src/test/core-flow-roundtrip.test.ts"
      - "src/test/fixtures/core-flow.definicao.json"
  workflow_dispatch:

jobs:
  core-flow-roundtrip:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CI: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Vitest — Core Flow round-trip
        run: bunx vitest run src/test/core-flow-roundtrip.test.ts --reporter=default
